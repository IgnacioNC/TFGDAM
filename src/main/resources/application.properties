spring.config.import=optional:file:.env[.properties]
spring.application.name=tfgdam
spring.datasource.url=${SARA_DB_URL:jdbc:mysql://localhost:3306/sara?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${SARA_DB_USERNAME:root}
spring.datasource.password=${SARA_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
sara.import.storage-path=${SARA_IMPORT_STORAGE_PATH:./storage/imports-ra}
sara.export.python-command=${SARA_EXPORT_PYTHON_COMMAND:python}
sara.export.script-path=${SARA_EXPORT_SCRIPT_PATH:./scripts/export_backend_template.py}
sara.export.template-path=${SARA_EXPORT_TEMPLATE_PATH:./storage/templates/source_template_unprotected.xlsx}
sara.export.filled-template-path=${SARA_EXPORT_FILLED_TEMPLATE_PATH:./storage/templates/source_template_rellenada_unprotected.xlsx}
sara.export.filled-template-path-2=${SARA_EXPORT_FILLED_TEMPLATE_PATH_2:./storage/templates/source_template_rellenada2_unprotected.xlsx}
sara.export.use-import-snapshot=${SARA_EXPORT_USE_IMPORT_SNAPSHOT:true}
sara.export.timeout-seconds=${SARA_EXPORT_TIMEOUT_SECONDS:120}
sara.jwt.secret=${SARA_JWT_SECRET:change-me-in-dotenv}
sara.jwt.access-token-expiration-ms=${SARA_JWT_EXP_MS:3600000}
sara.google-auth.client-ids=${SARA_GOOGLE_CLIENT_IDS:}
sara.google-auth.allowed-domain=${SARA_GOOGLE_ALLOWED_DOMAIN:colegiomiralmonte.es}
sara.google-auth.tokeninfo-url=${SARA_GOOGLE_TOKENINFO_URL:https://oauth2.googleapis.com/tokeninfo}
sara.recaptcha.secret-key=${SARA_RECAPTCHA_SECRET_KEY:}
sara.recaptcha.verify-url=${SARA_RECAPTCHA_VERIFY_URL:https://www.google.com/recaptcha/api/siteverify}
